# Optional — only needed if you want to develop against real Postgres instead of the
# default SQLite dev path (see README.md's "Development against Postgres" section). The
# packaged desktop app doesn't use this at all.
services:
  postgres:
    image: postgres:17.2
    container_name: stocksmith-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: stocksmith
      POSTGRES_PASSWORD: stocksmith
      POSTGRES_DB: stocksmith
    ports:
      - "5432:5432"
    volumes:
      - stocksmith-postgres-data:/var/lib/postgresql/data

volumes:
  stocksmith-postgres-data:
